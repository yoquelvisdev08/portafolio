    <script>
      (function () {
        var languageKey = 'language';
        var themeKey = 'portfolio-theme';
        var themeColors = { blue: '#0b1326', light: '#f7f9fb' };

        var storedTheme = localStorage.getItem(themeKey);
        var introKey = 'portfolio-theme-intro-seen';
        var willPlayIntro = false;

        try {
          willPlayIntro =
            !sessionStorage.getItem(introKey) &&
            window.location.pathname !== '/precio' &&
            (window.location.pathname === '/' || window.location.pathname === '');
        } catch (error) {
          willPlayIntro = false;
        }

        var theme = willPlayIntro
          ? 'light'
          : storedTheme === 'light' || storedTheme === 'blue'
            ? storedTheme
            : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'blue';

        document.documentElement.setAttribute('data-theme', theme);

        var themeColorMeta = document.querySelector('meta[name="theme-color"]');
        if (themeColorMeta) {
          themeColorMeta.setAttribute('content', themeColors[theme] || themeColors.blue);
        }

        var storedLanguage = localStorage.getItem(languageKey);
        var language = storedLanguage === 'en' || storedLanguage === 'es' ? storedLanguage : (function () {
          var browserLanguages = navigator.languages && navigator.languages.length
            ? navigator.languages
            : [navigator.language || 'en'];

          for (var index = 0; index < browserLanguages.length; index += 1) {
            var code = browserLanguages[index].toLowerCase().split('-')[0];
            if (code === 'es') return 'es';
            if (code === 'en') return 'en';
          }

          return 'en';
        })();

        document.documentElement.setAttribute('lang', language);
      })();

      (function () {
        var markIconsReady = function () {
          document.documentElement.classList.add('icons-ready');
        };

        if (document.fonts && document.fonts.load) {
          document.fonts
            .load('400 24px "Material Symbols Outlined"')
            .then(markIconsReady)
            .catch(markIconsReady);
        } else {
          markIconsReady();
        }

        window.setTimeout(markIconsReady, 2500);
      })();
    </script>
